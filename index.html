<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers EZZKKYK</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --btn: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        .header { text-align: center; margin-bottom: 20px; }
        .config-bar { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .map-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .res-container { display: none; } /* Começa escondido */
        .res-input { width: 48%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }
        .btn-play { display: block; width: 100%; padding: 15px; background: #333; color: white; text-align: center; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; border: none; }
        #fps-counter { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; color: #0f0; display: none; } /* Começa escondido */
    </style>
</head>
<body>

    <div id="fps-counter">FPS: --</div>

    <div class="header">
        <h1>MAPAS DISPONÍVEIS</h1>
        <div class="config-bar">
            <button onclick="toggleFPS()">FPS: <span id="fps-status">OFF</span></button>
            <button onclick="toggleRes()">Resolução: <span id="res-status">OFF</span></button>
        </div>
    </div>

    <script>
        function toggleFPS() {
            let el = document.getElementById('fps-counter');
            let st = document.getElementById('fps-status');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
            st.innerText = (el.style.display === 'block') ? 'ON' : 'OFF';
        }

        function toggleRes() {
            let divs = document.querySelectorAll('.res-container');
            let st = document.getElementById('res-status');
            let visible = divs[0].style.display === 'block';
            divs.forEach(d => d.style.display = visible ? 'none' : 'block');
            st.innerText = visible ? 'OFF' : 'ON';
        }

        function abrir(url, wId, hId) {
            let w = document.getElementById(wId).value || 1280;
            let h = document.getElementById(hId).value || 720;
            window.open(url, '_blank', 'width='+w+',height='+h);
        }
    </script>

    <div class="map-card">
        <div class="map-title">Zurich (EZZKKYK)</div>
        <div class="res-container">
            <input type="number" class="res-input" id="w1" placeholder="Largura">
            <input type="number" class="res-input" id="h1" placeholder="Altura">
        </div>
        <button class="btn-play" onclick="abrir('Games/Zurich/', 'w1', 'h1')">JOGAR</button>
    </div>

</body>
</html>
