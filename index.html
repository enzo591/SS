<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers EZZKY</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 100px; }
        .card { background: #161616; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn { display: block; width: 100%; padding: 12px; background: #fff; color: #000; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; margin-top: 10px; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 10; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20; align-items: center; justify-content: center; }
        .modal-box { background: #161616; padding: 25px; width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <img src="1000059745.png" alt="Zurich">
            <h3>ZURICH</h3>
            <a href="Games/Zurich/" class="btn">PLAY</a>
        </div>
        <div class="card">
            <img src="1000059746.jpg" alt="Houston">
            <h3>HOUSTON</h3>
            <a href="Games/Houston/" class="btn">PLAY</a>
        </div>
        <div class="card">
            <img src="1000059747.webp" alt="Monaco">
            <h3>MONACO</h3>
            <a href="Games/Monaco/" class="btn">PLAY</a>
        </div>
        <div class="card">
            <img src="1000059748.jpg" alt="San Francisco">
            <h3>SAN FRANCISCO</h3>
            <a href="Games/SanFrancisco/" class="btn">PLAY</a>
        </div>
    </div>

    <div class="bottom-bar">
        <span onclick="window.location.reload()">Mapas</span>
        <span onclick="document.getElementById('m').style.display='flex'">⚙️ Configs</span>
    </div>

    <div id="m" class="modal">
        <div class="modal-box">
            <h2>Configurações</h2>
            <label>Largura: <input type="number" id="w" value="1280"></label><br><br>
            <label>Mostrar FPS: <input type="checkbox" id="fps"></label><br><br>
            <button onclick="salvar()" style="width: 100%; padding: 10px;">SALVAR</button>
        </div>
    </div>

    <script>
        function salvar() {
            localStorage.setItem('w', document.getElementById('w').value);
            localStorage.setItem('fps', document.getElementById('fps').checked);
            document.getElementById('m').style.display = 'none';
            alert("Salvo!");
        }
    </script>
</body>
</html>
