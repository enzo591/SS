<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Grid dos mapas */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* O card igual ao da foto */
        .map-card { background: #161616; border-radius: 15px; padding: 15px; border: 1px solid #222; }
        .map-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        
        .map-info { padding-top: 10px; }
        .map-info h3 { margin: 5px 0; font-size: 1.2rem; }
        .map-info p { color: #888; font-size: 0.85rem; margin-bottom: 15px; }
        
        /* Botão igual ao da foto */
        .btn-play { background: #fff; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Barra inferior fixa */
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; padding: 10px 30px; border-radius: 50px; border: 1px solid #333; display: flex; gap: 40px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="map-card">
            <img src="zurich.jpg" alt="Zurich">
            <div class="map-info">
                <h3>Zurich</h3>
                <p>Alpes urbanos. Versão normal do mapa.</p>
                <button class="btn-play">Jogar</button>
            </div>
        </div>

        <div class="map-card">
            <img src="houston.jpg" alt="Houston">
            <div class="map-info">
                <h3>Houston</h3>
                <p>Space themes & Urban park.</p>
                <button class="btn-play">Jogar</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <span>Mapas</span>
        <span onclick="alert('Abrir Configs')">Configs</span>
    </div>

</body>
</html>
