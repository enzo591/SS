<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; --subtext: #888; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.5rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .card { background: var(--card); border-radius: 16px; padding: 16px; border: 1px solid #222; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        
        .card h3 { margin: 0; font-size: 1.2rem; }
        .card p { color: var(--subtext); font-size: 0.85rem; margin: 5px 0 15px 0; }
        
        .btn-play { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }

        .nav-bottom { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; padding: 10px 25px; border-radius: 50px; border: 1px solid #333; display: flex; gap: 30px; z-index: 1000; }
        .nav-bottom span { color: #fff; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Home</h1>
    </div>

    <div class="grid">
        <div class="card">
            <img src="1000059745.png" alt="Zurich">
            <h3>Zurich</h3>
            <p>Alpes urbanos. Versão normal do mapa.</p>
            <button class="btn-play" onclick="window.location.href='Games/Zurich/'">Jogar</button>
        </div>

        <div class="card">
            <img src="1000059746.jpg" alt="Houston">
            <h3>Houston</h3>
            <p>Space themes & Urban park.</p>
            <button class="btn-play" onclick="window.location.href='Games/Houston/'">Jogar</button>
        </div>

        <div class="card">
            <img src="1000059747.webp" alt="Monaco">
            <h3>Monaco</h3>
            <p>Luxurious race circuit & Marina.</p>
            <button class="btn-play" onclick="window.location.href='Games/Monaco/'">Jogar</button>
        </div>

        <div class="card">
            <img src="1000059748.jpg" alt="San Francisco">
            <h3>San Francisco</h3>
            <p>Golden Gate Bridge & Sunny park.</p>
            <button class="btn-play" onclick="window.location.href='Games/SanFrancisco/'">Jogar</button>
        </div>
    </div>

    <div class="nav-bottom">
        <span>Mapas</span>
        <span onclick="window.location.href='config.html'">Config</span>
    </div>

</body>
</html>
