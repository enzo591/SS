<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Subway Surfers EZZKKYK</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .map-card { 
            background: #1a1a1a; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid #333;
        }
        .map-title { font-size: 1.3em; font-weight: bold; margin-bottom: 5px; }
        .map-desc { color: #aaa; font-size: 0.9em; margin-bottom: 15px; }
        .btn-play { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            background: #222; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold;
            border: none;
            box-sizing: border-box; /* Garante que o padding não quebre o alinhamento */
        }
    </style>
</head>
