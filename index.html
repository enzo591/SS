<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers EZZKY</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px 100px 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .rgb-text { font-size: 3rem; font-weight: 900; background: linear-gradient(90deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff); background-clip: text; -webkit-background-clip: text; color: transparent; animation: rgb-anim 5s linear infinite; }
        @keyframes rgb-anim { to { filter: hue-rotate(360deg); } }

        /* Barra Inferior Fixa (Design Profissional) */
        .bottom-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); padding: 15px 30px; border-radius: 50px; display: flex; gap: 40px; border: 1px solid #333; z-index: 999; }
        .icon { cursor: pointer; transition: 0.2s; text-decoration: none; color: white; display: flex; align-items: center; gap: 5px; }
        .icon:hover { color: #aaa; }

        /* Modal de Configurações (Aba Lateral) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #161616; width: 90%; max-width: 900px; height: 80vh; border-radius: 20px; border: 1px solid #333; display: flex; overflow: hidden; }
        
        .sidebar { width: 250px; border-right: 1px solid #333; padding: 20px; color: white; }
        .sidebar h3 { font-weight: 800; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .sidebar p { margin: 15px 0; cursor: pointer; color: #888; font-size: 0.9rem; }
        .sidebar p:hover, .active-aba { color: white !important; font-weight: 600; }
        
        .settings-view { flex-grow: 1; padding: 30px; }
        .view-content h2 { margin-top: 0; font-weight: 800; }
        .view-content p { color: #888; margin-bottom: 25px; }
        .btn-salvar { display: block; width: 100%; padding: 15px; background: white; color: black; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; }

        /* Cards de Mapa Profissionais (Estilo suas fotos) */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .map-card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; text-align: left; }
        .map-tag { color: rgb(255, 60, 60); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .map-title { font-size: 1.8rem; font-weight: 800; margin: 5px 0; }
        .map-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; display: block; }
