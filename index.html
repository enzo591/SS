<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers EZZKKYK</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .map-card { 
            background: #1a1a1a; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid #333;
            transition: 0.3s;
        }
        .map-card:hover { border-color: #00d2ff; }
        .map-title { font-size: 1.5em; font-weight: bold; margin: 10px 0; color: #fff; }
        .map-desc { color: #aaa; font-size: 0.9em; margin-bottom: 15px; }
        .btn-play { 
            display: block; width: 100%; padding: 15px; background: #fff; color: #000; 
            text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAPAS DISPONÍVEIS</h1>
    </div>

    <div class="map-card">
        <div class="map-title">Zurich (EZZKKYK)</div>
        <div class="map-desc">Versão personalizada por EZZKKYK</div>
        <a href="Games/Zurich/" class="btn-play">Jogar</a>
    </div>

    <div class="map-card">
        <div class="map-title">Berlin</div>
        <div class="map-desc">Versão normal do mapa.</div>
        <a href="Games/Berlin/" class="btn-play">Jogar</a>
    </div>

    <div class="map-card">
        <div class="map-title">Houston</div>
        <div class="map-desc">Versão normal do mapa.</div>
        <a href="Games/Houston/" class="btn-play">Jogar</a>
    </div>

</body>
</html>
