<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers Home</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; padding-bottom: 120px; }
        
        .card { background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card h3 { margin: 0 0 10px 0; font-size: 20px; }
        
        .btn-jogar { background: #ffffff; color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .navbar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #444; }
        
        #settings-modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: #000; padding: 20px; box-sizing: border-box; z-index: 1000; }
        .res-box { display: flex; gap: 10px; margin-top: 10px; }
        .res-box input { width: 45%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; }
        .btn-action { width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="card">
            <img src="thumb_monaco.jpg" alt="Monaco">
            <div class="card-content">
                <h3>Monaco</h3>
                <button class="btn-jogar" onclick="window.location.href='Games/Monaco/index.html'">JOGAR</button>
                <div style="padding: 20px;">
    <img src="img/banner.jpg" style="width: 100%; border-radius: 15px; border: 1px solid #333;">
</div>

            </div>
        </div>
        <div class="card">
            <img src="thumb_zurich.jpg" alt="Zurich">
            <div class="card-content">
                <h3>Zurich</h3>
                <button class="btn-jogar" onclick="window.location.href='Games/Zurich/index.html'">JOGAR</button>
            </div>
        </div>
        <div class="card">
            <img src="thumb_houston.jpg" alt="Houston">
            <div class="card-content">
                <h3>Houston</h3>
                <button class="btn-jogar" onclick="window.location.href='Games/Houston/index.html'">JOGAR</button>
            </div>
        </div>
        <div class="card">
            <img src="thumb_sanfrancisco.jpg" alt="San Francisco">
            <div class="card-content">
                <h3>San Francisco</h3>
                <button class="btn-jogar" onclick="window.location.href='Games/SanFrancisco/index.html'">JOGAR</button>
            </div>
        </div>
        <div class="card">
            <img src="thumb_berlin.jpg" alt="Berlin">
            <div class="card-content">
                <h3>Berlin</h3>
                <button class="btn-jogar" onclick="window.location.href='Games/Berlin/index.html'">JOGAR</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <span onclick="window.location.reload()">MAPAS</span>
        <span onclick="document.getElementById('settings-modal').style.display='block'">⚙️ CONFIG</span>
    </div>

    <div id="settings-modal">
        <h2>Configurações</h2>
        <p>Idioma</p>
        <select style="width:100%; padding: 10px; background: #222; color: white; border: none;"><option>Português</option><option>English</option></select>
        <p>Resolução (Largura x Altura)</p>
        <div class="res-box">
            <input type="text" placeholder="Largura">
            <input type="text" placeholder="Altura">
        </div>
        <p>FPS</p>
        <select style="width:100%; padding: 10px; background: #222; color: white; border: none;"><option>60 FPS</option><option>30 FPS</option></select>
        <button class="btn-action" style="background: #fff;" onclick="document.getElementById('settings-modal').style.display='none'">SALVAR</button>
        <button class="btn-action" style="background: #333; color: white;" onclick="document.getElementById('settings-modal').style.display='none'">FECHAR</button>
    </div>

</body>
</html>
