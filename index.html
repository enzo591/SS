<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZZKY Maps</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --text: #ffffff; --text-dim: #a0a0a0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin: 40px 0; }
        .header h1 { font-size: 2.5rem; font-weight: 900; margin: 0; }
        
        /* Card do Mapa */
        .map-card { background: var(--card); border-radius: 25px; padding: 25px; margin-bottom: 30px; border: 1px solid #222; }
        .map-subtitle { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .map-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .map-desc { color: var(--text-dim); font-size: 1rem; margin-bottom: 20px; }
        
        /* Botão */
        .btn-play { width: 100%; padding: 20px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-play:hover { background: #333; }

        /* Barra Inferior (Dock) */
        .dock { position: fixed; bottom: 20px; left: 5%; width: 90%; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); padding: 15px; border-radius: 50px; display: flex; justify-content: space-around; border: 1px solid #333; }
        .dock-item { color: white; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BY EZZKY</h1>
    </div>

    <div class="map-card">
        <div class="map-subtitle">Suíça</div>
        <div class="map-title">Zurich</div>
        <div class="map-desc">Alpes urbanos. Versão completa do mapa.</div>
        <button class="btn-play" onclick="window.open('Games/Zurich/', '_blank')">▶ JOGAR</button>
    </div>

    <div class="map-card">
        <div class="map-subtitle">Alemanha</div>
        <div class="map-title">Berlin</div>
        <div class="map-desc">Cenas urbanas e metrô clássico.</div>
        <button class="btn-play" onclick="window.open('Games/Berlin/', '_blank')">▶ JOGAR</button>
    </div>

    <div class="dock">
        <div class="dock-item">🏃</div>
        <div class="dock-item" style="font-weight:bold; border-bottom: 2px solid white;">Mapas</div>
        <div class="dock-item">⚙️</div>
    </div>

    <div style="height: 100px;"></div> </body>
</html>
