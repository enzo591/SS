<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers EZZKY</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        
        /* Cabeçalho e Título RGB */
        .header { text-align: center; margin-bottom: 50px; }
        .rgb-text { font-size: 3rem; font-weight: 900; background: linear-gradient(90deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff); background-clip: text; -webkit-background-clip: text; color: transparent; animation: rgb-anim 5s linear infinite; }
        @keyframes rgb-anim { to { filter: hue-rotate(360deg); } }

        /* Engrenagem Vidro (Glassmorphism) */
        .gear-container { display: flex; justify-content: center; margin-top: 20px; }
        .gear-btn { font-size: 2.5rem; cursor: pointer; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 15px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .gear-btn:hover { background: rgba(0,0,0,0.6); transform: rotate(90deg); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: #161616; width: 85%; max-width: 500px; margin: 20% auto; padding: 40px; border-radius: 25px; border: 1px solid #333; text-align: center; }
        
        /* Cards */
        .map-card { background: var(--card); border-radius: 25px; padding: 30px; margin-bottom: 30px; border: 1px solid #222; }
        .map-title { font-size: 2rem; font-weight: 800; margin-bottom: 20px; }
        .btn-play { display: block; width: 100%; padding: 25px; background: #222; color: white; text-align: center; border-radius: 15px; font-size: 1.5rem; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .btn-play:hover { background: #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="rgb-text">BY EZZKY</h1>
        <div class="gear-container">
            <div class="gear-btn" onclick="toggleModal()">⚙️</div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Configurações</h2>
            <p>Menu de opções em breve...</p>
            <button onclick="toggleModal()" style="width:100%; padding: 15px; border-radius: 12px; border: none; background: #333; color: white; cursor: pointer;">Fechar</button>
        </div>
    </div>

    <div class="map-card"><div class="map-title">Zurich</div><button class="btn-play" onclick="abrir('Games/Zurich/')">JOGAR</button></div>
    <div class="map-card"><div class="map-title">Berlin</div><button class="btn-play" onclick="abrir('Games/Berlin/')">JOGAR</button></div>
    <div class="map-card"><div class="map-title">Houston</div><button class="btn-play" onclick="abrir('Games/Houston/')">JOGAR</button></div>
    <div class="map-card"><div class="map-title">Monaco</div><button class="btn-play" onclick="abrir('Games/Monaco/')">JOGAR</button></div>
    <div class="map-card"><div class="map-title">San Francisco</div><button class="btn-play" onclick="abrir('Games/San Francisco/')">JOGAR</button></div>

    <script>
        function toggleModal() { let m = document.getElementById('settingsModal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        function abrir(url) { window.open(url, '_blank'); }
    </script>
</body>
</html>
