<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Subway Surfers - Jogando</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #unity-container { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        var buildUrl = "Build";
        var config = {
            dataUrl: buildUrl + "/ZurichNewPrivacy.data.unityweb",
            frameworkUrl: buildUrl + "/ZurichNewPrivacy.wasm.framework.unityweb",
            codeUrl: buildUrl + "/ZurichNewPrivacy.wasm.code.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Subway Surfers",
            productVersion: "0.1",
        };

        var canvas = document.querySelector("#unity-canvas");
        createUnityInstance(canvas, config).then((unityInstance) => {
            console.log("Jogo carregado!");
        }).catch((message) => {
            alert("Erro ao carregar: " + message);
        });
    </script>
</body>
</html>
